
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر نوح - Noah Store</title>
    <style>
        /* إعدادات الألوان الأساسية */
        :root {
            --bg-color: #33667c; /* لون خلفية الصورة الدقيق */
            --gold-accent: #c5a059;
            --white: #ffffff;
        }

        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background-color: #f4f4f4;
        }

        /* الهيدر مع معالجة امتداد الصورة */
        header {
            background-color: var(--bg-color); /* اللون اللي هيمد الصورة يمين وشمال */
            background-image: url('https://i.postimg.cc/4NrGNMvM/Gemini-Generated-Image-x4kvxlx4kvxlx4kv.png');
            background-size: contain; /* عشان الصورة تظهر كاملة بدون قص */
            background-repeat: no-repeat;
            background-position: center;
            height: 400px;
            width: 100%;
            border-bottom: 4px solid var(--gold-accent);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* شريط التنقل */
        nav {
            background-color: #264d5e; /* درجة أغمق قليلاً للتنقل */
            padding: 15px 0;
            text-align: center;
        }
        nav a {
            color: var(--gold-accent);
            text-decoration: none;
            margin: 0 20px;
            font-weight: bold;
            font-size: 18px;
        }

        /* تنسيق قسم المنتجات */
        .container {
            padding: 40px 20px;
            max-width: 1200px;
            margin: auto;
        }
        .section-title {
            text-align: center;
            color: #264d5e;
            margin-bottom: 30px;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }
        .product-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            padding-bottom: 20px;
            transition: 0.3s;
            border: 1px solid #eee;
        }
        .product-card:hover {
            transform: translateY(-5px);
            border-color: var(--gold-accent);
        }
        .product-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }
        .price {
            color: #2ecc71;
            font-size: 20px;
            font-weight: bold;
            margin: 10px 0;
        }
        .btn-add {
            background-color: #264d5e;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-add:hover {
            background-color: var(--gold-accent);
        }
    </style>
</head>
<body>

    <header></header>

    <nav>
        <a href="#">الرئيسية</a>
        <a href="#">المنظفات</a>
        <a href="#">العطور</a>
        <a href="#">اتصل بنا</a>
    </nav>

    <div class="container">
        <h2 class="section-title">منتجاتنا المختارة</h2>
        <div class="products-grid">
            <div class="product-card">
                <img src="https://via.placeholder.com/250" alt="منتج">
                <h3>اسم المنتج</h3>
                <p class="price">450 ج.م</p>
                <button class="btn-add">أضف للسلة</button>
            </div>
            </div>
    </div>

</body>
</html>

</body>
</html>
