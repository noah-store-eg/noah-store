<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر نوح - Noah Store</title>
    <style>
        /* إعدادات الألوان - تم سحب الدرجة بدقة من خلفية الصورة */
        :root {
            --noah-blue: #32657a; 
            --gold-accent: #c5a059;
            --dark-blue: #1a3a47;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background-color: #f8f9fa;
        }

        /* الهيدر مع Zoom Out إضافي */
        header {
            /* اللون ده هو اللي بيملا الفراغات حوالين الصورة */
            background-color: var(--noah-blue);
            
            /* رابط الصورة المباشر */
            background-image: url('https://i.postimg.cc/4NrGNMvM/Gemini-Generated-Image-x4kvxlx4kvxlx4kv.png');
            
            /* تقليل الحجم لـ 80% لعمل Zoom Out وإظهار التفاصيل */
            background-size: 80% auto;
            
            background-position: center;
            background-repeat: no-repeat;
            
            /* ارتفاع الهيدر */
            height: 450px; 
            width: 100%;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-bottom: 5px solid var(--gold-accent);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* تنسيق الموبايل - عشان الصورة متصغرش زيادة عن اللزوم */
        @media (max-width: 768px) {
            header {
                background-size: 95% auto;
                height: 300px;
            }
        }

        /* شريط التنقل */
        nav {
            background-color: var(--dark-blue);
            padding: 15px 0;
            text-align: center;
        }
        nav a {
            color: var(--gold-accent);
            text-decoration: none;
            margin: 0 20px;
            font-weight: bold;
            font-size: 18px;
        }

        /* قسم المنتجات */
        .container {
            padding: 50px 20px;
            max-width: 1200px;
            margin: auto;
        }
        .section-title {
            text-align: center;
            color: var(--dark-blue);
            margin-bottom: 40px;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }
        .product-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            padding: 20px;
            border: 1px solid #eee;
        }
        .btn-add {
            background-color: var(--dark-blue);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header></header>

    <nav>
        <a href="#">الرئيسية</a>
        <a href="#">المنظفات</a>
        <a href="#">العطور</a>
        <a href="#">تواصل معنا</a>
    </nav>

    <div class="container">
        <h2 class="section-title">منتجات براند نوح</h2>
        <div class="products-grid">
            <div class="product-card">
                <img src="https://via.placeholder.com/300x200/32657a/ffffff?text=Noah+Product" alt="منتج" style="width:100%; border-radius:10px;">
                <h3>اسم المنتج</h3>
                <p style="color: #27ae60; font-weight: bold;">السعر: 150 ج.م</p>
                <button class="btn-add">أضف للسلة</button>
            </div>
        </div>
    </div>

</body>
</html>
