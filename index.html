<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر نوح </title>

    <link rel="icon" type="image/x-icon" href="https://i.postimg.cc/4NrGNMvM/Gemini-Generated-Image-x4kvxlx4kvxlx4kv.png">

    <style>
        body { margin: 0; padding: 0; font-family: 'Arial', sans-serif; background-color: #f4f4f4; }

        /* --- الهيدر (الكمبيوتر) --- */
        .header-container {
            background-color: #032e3b; 
            width: 100%;
            height: 700px; /* ارتفاع ثابت ومناسب للكمبيوتر */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 4px solid #c5a059;
        }

        .header-container img {
            /* الأوامر دي هي اللي بتلغي الحواف في الكمبيوتر */
            width: 100vw; /* تاخد عرض الشاشة بالكامل */
            height: 100%; /* تاخد الارتفاع بالكامل */
            object-fit: cover; /* تمط الصورة وتملا الفراغات غصب عنها */
            /* الخاصية اللي تحت دي بتخلي الكود يركز على الصورة كلها في النص */
            object-position: center center;
            display: block;
        }

        /* --- إعدادات الموبايل (عشان يفضل مظبوط) --- */
        @media (max-width: 768px) {
    .header-container {
        height: 300px; /* جرب تصغر الارتفاع هنا، ده هيقلل الزووم تلقائياً */
    }
    .header-container img {
        width: 100%; 
        object-fit: contain; /* جرب دي وشوف لو اللوجو بقى أوضح والحواف مقبولة */
        background-color: #032e3b; /* عشان لو ظهر حواف تكون بنفس اللون */
    }
}

        /* باقي التنسيقات (المنيو والمنتجات) */
        nav { background-color: #111; padding: 15px 0; text-align: center; position: sticky; top: 0; z-index: 1000; }
        nav a { color: #c5a059; text-decoration: none; margin: 0 15px; font-weight: bold; font-size: 18px; }
        .container { padding: 40px 20px; max-width: 1200px; margin: auto; }
        .section-title { text-align: center; margin-bottom: 30px; font-size: 28px; }
        .products-grid { display: flex; justify-content: center; flex-wrap: wrap; gap: 25px; }
        .product-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; width: 350px; padding-bottom: 20px; }
        .image-container { position: relative; width: 100%; height: 350px; background-color: #fff; }
        .image-container img { width: 100%; height: 100%; object-fit: contain; position: absolute; top: 0; left: 0; padding: 15px; }
        .price { color: #27ae60; font-size: 26px; font-weight: bold; margin: 15px 0; }
        .btn-add { background-color: #111; color: #c5a059; border: 2px solid #c5a059; padding: 10px 30px; border-radius: 5px; text-decoration: none; font-weight: bold; display: inline-block; }
        .contact-footer { background-color: #111; color: white; padding: 40px; text-align: center; border-top: 5px solid #c5a059; }
        .whatsapp-float { position: fixed; bottom: 25px; left: 25px; background-color: #25d366; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 1000; }
    </style>
</head>
<body>

    <div class="header-container">
        <img src="https://i.postimg.cc/4NrGNMvM/Gemini-Generated-Image-x4kvxlx4kvxlx4kv.png" alt="نوح">
    </div>

    <nav>
        <a href="#">الرئيسية</a>
        <a href="#products">المنتجات</a>
        <a href="#contact">تواصل معنا</a>
    </nav>

    <div class="container" id="products">
        <h2 class="section-title">منتجات نوح</h2>
        <div class="products-grid">
            <div class="product-card">
                <div class="image-container">
                    <img src="https://i.postimg.cc/Y2JJBFxK/lqtt-shasht-2026-04-19-084935.png" alt="بخاخ">
                </div>
                <h3>معطر بخاخ فريدا</h3>
                <p class="price">55 ج.م</p>
                <a href="https://wa.me/201117306850" class="btn-add">اطلب الآن</a>
            </div>
        </div>
    </div>

    <footer class="contact-footer" id="contact">
        <a href="tel:+201117306850" style="color: #c5a059; font-size: 24px; text-decoration: none;">01117306850</a>
    </footer>

    <a href="https://wa.me/201117306850" class="whatsapp-float" target="_blank">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="35">
    </a>

</body>
</html>
